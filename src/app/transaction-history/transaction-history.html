<table>
    <tr>
        <th>
            <div class="thGroup">
                <span>From</span>
                <i class="fa fa-sort" (click)="sort($event)"></i>
            </div>
        </th>
        <th>
            <div class="thGroup">
                <span>To</span>
                <i class="fa fa-sort" (click)="sort($event)"></i>
            </div>
        </th>
        <th>
            <div class="thGroup">
                <span>Amount</span>
                <i class="fa fa-sort" (click)="sort($event)"></i>
            </div>
        </th>
        <th>
            <div class="thGroup">
                <span>Type</span>
                <i class="fa fa-sort" (click)="sort($event)"></i>
            </div>
        </th>
        <th>
            <div class="thGroup">
                <span>Date</span>
                <i class="fa fa-sort" (click)="sort($event)"></i>
            </div>
        </th>
    </tr>
    @for (transaction of (transactionsSubject | async); track transaction) {
        <tr>
            <td>{{ transaction.srcAccountNum }}</td>
            <td>{{ transaction.dstAccountNum }}</td>
            <td>{{ transaction.amount }}</td>
            <td>{{ transaction.type }}</td>
            <td>{{ transaction.date }}</td>
        </tr>
    }
</table>
