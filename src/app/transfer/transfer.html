<div class="transferWrapper" [formGroup]="transferForm">
  <text-input [label]="transferLabel" type="accountNum" [control]="formControl['accountNum']" [showErrors]="attemptedTransfer"></text-input>
  <text-input [label]="amountLabel" type="amount" [control]="formControl['amount']" [showErrors]="attemptedTransfer"></text-input>
  <button (click)="transfer">Transfer</button>
</div>
