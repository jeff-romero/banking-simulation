<div id="top">
    <div id="menu">
        <a routerLink="/" id="home">{{ bankName }}</a>
        <a routerLink="login" id="loginStatus"><i [class]="logInStatusIcon"></i> {{ logInStatus }}</a>
    </div>
    <div id="navbar">
        <div class="dropdown" id="checking-savings-dropdown">
            <button class="dropdown-title">{{ checkingSavings }} <i class="fa fa-caret-down"></i></button>
            <div class="dropdown-content">
                <a routerLink="">Checking and Debit</a>
            </div>
        </div>
        <div class="dropdown">
            <button (click)="hover($event)" class="dropdown-title">{{ services }} <i class="fa fa-caret-down"></i></button>
            <div class="dropdown-content">
                <a routerLink="">Widhdraw Funds</a>
                <a routerLink="">Transfer Funds</a>
                <a routerLink="">Make a Deposit</a>
                <a routerLink="">Bill Pay</a>
                <a routerLink="">Manage Account</a>
            </div>
        </div>
    </div>
</div>
